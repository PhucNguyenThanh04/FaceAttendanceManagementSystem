services:
  qdrant:
    image: qdrant/qdrant
    container_name: fm_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - ./storage/qdrant:/qdrant/storage
    networks:
      - fm_back_vector

  postgres:
    image: postgres:16-alpine
    container_name: fm_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Facematching123*
      POSTGRES_DB: facematching
    ports:
      - "5433:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - fm_back_vector

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - fm_back_vector

networks:
  fm_back_vector:
    driver: bridge

volumes:
  redis_data: