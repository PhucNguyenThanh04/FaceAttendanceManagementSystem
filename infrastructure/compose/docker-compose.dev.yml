services:
  qdrant:
    image: qdrant/qdrant
    container_name: fm_qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./storage/qdrant:/qdrant/storage

  postgres:
    image: postgres:16-alpine
    container_name: fm_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Facematching123*
      POSTGRES_DB: facematching
    ports:
        - "5433:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5


networks:
    fm_back_vector:
      driver: bridge


